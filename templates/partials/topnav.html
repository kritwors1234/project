<!--Topside-->
<div class="row mb-4">
    <!-- Total Sales (Dark Card) -->
    <div class="col-md-6 col-lg-3 mb-4 mb-lg-0">
        <a class="text-decoration-none" href="{%url 'dashboard-sales-summary'%}">
            <div class="card card-dark h-100 mb-0">
                <div class="card-body d-flex flex-column justify-content-center h-100 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="icon-circle bg-white text-dark rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                            <i class="fas fa-chart-line" style="font-size: 1.2rem; color: var(--ocean-10);"></i>
                        </div>
                    </div>
                    <p class="mb-1 text-light">Total Sales</p>
                    <h3 class="mb-0 font-weight-bold text-white">฿{{ nav_total_sales_amount|floatformat:2 }}</h3>
                </div>
            </div>
        </a>
    </div>

    <!-- Total Orders -->
    <div class="col-md-6 col-lg-3 mb-4 mb-lg-0">
        <a class="text-decoration-none" href="{%url 'sales-history'%}">
            <div class="stat-card h-100 d-flex flex-column justify-content-center text-left p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="icon-circle rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; background-color: var(--ocean-90);">
                        <i class="fas fa-shipping-fast" style="font-size: 1.2rem; color: var(--ocean-30);"></i>
                    </div>
                </div>
                <p class="mb-1" style="color: #555555 !important;">Total Orders</p>
                <h3 class="mb-0 font-weight-bold" style="color: #000000;">{{ nav_total_orders }}</h3>
            </div>
        </a>
    </div>

    <!-- Total Cost Stock -->
    <div class="col-md-6 col-lg-3 mb-4 mb-md-0">
        <div class="stat-card h-100 d-flex flex-column justify-content-center text-left p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="icon-circle rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; background-color: var(--ocean-90);">
                    <i class="fas fa-wallet" style="font-size: 1.2rem; color: var(--ocean-30);"></i>
                </div>
            </div>
            <p class="mb-1" style="color: #555555 !important;">Total Cost Stock</p>
            <h3 class="mb-0 font-weight-bold" style="color: #000000;">฿{{ nav_total_cost_stock|floatformat:2 }}</h3>
        </div>
    </div>

    <!-- Total Products -->
    <div class="col-md-6 col-lg-3">
        <a class="text-decoration-none" href="{%url 'dashboard-product'%}">
            <div class="stat-card h-100 d-flex flex-column justify-content-center text-left p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="icon-circle rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; background-color: var(--ocean-90);">
                        <i class="fas fa-box" style="font-size: 1.2rem; color: var(--ocean-30);"></i>
                    </div>
                </div>
                <p class="mb-1" style="color: #555555 !important;">Total Products</p>
                <h3 class="mb-0 font-weight-bold" style="color: #000000;">{{ nav_total_product_pieces }}</h3>
            </div>
        </a>
    </div>
</div>
<!--End Topside-->
